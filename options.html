<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Improve with GPT — Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
      color: #333;
    }
    h1 {
      font-size: 1.4em;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      margin-top: 18px;
    }
    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .api-key-wrapper {
      display: flex;
      gap: 8px;
    }
    .api-key-wrapper input {
      flex: 1;
    }
    .toggle-visibility {
      padding: 8px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f5f5f5;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }
    .toggle-visibility:hover {
      background: #e8e8e8;
    }
    button#save {
      margin-top: 24px;
      padding: 10px 24px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    button#save:hover {
      background: #1d4ed8;
    }
    .status {
      margin-top: 12px;
      color: #16a34a;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Improve with GPT — Settings</h1>

  <label for="apiKey">OpenAI API Key</label>
  <div class="api-key-wrapper">
    <input type="password" id="apiKey" placeholder="sk-...">
    <button type="button" class="toggle-visibility" id="toggleKey">Show</button>
  </div>

  <label for="model">Model</label>
  <select id="model">
    <option value="gpt-4o">gpt-4o</option>
    <option value="gpt-4o-mini">gpt-4o-mini</option>
    <option value="gpt-4-turbo">gpt-4-turbo</option>
  </select>

  <button id="save">Save</button>
  <div class="status" id="status"></div>

  <script src="options.js"></script>
</body>
</html>
